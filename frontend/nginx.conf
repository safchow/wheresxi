server {
  # Listen on whatever port the platform injects (Railway picks one and
  # sets it as PORT; falls back to 80 for local docker runs). The nginx
  # image envsubsts this template at container start — see the Dockerfile
  # which drops the file into /etc/nginx/templates/.
  listen       ${PORT};
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # SPA fallback — every unknown path routes back to index.html so React
  # Router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets emitted by Vite, since their filenames change
  # whenever the content does.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

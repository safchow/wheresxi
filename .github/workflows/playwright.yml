name: Playwright Backend Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-playwright:
    name: Backend Playwright suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wheresxi
          POSTGRES_PASSWORD: wheresxi_dev
          POSTGRES_DB: wheresxi_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U wheresxi -d wheresxi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply test database migrations
        run: pnpm test:backend:e2e:setup

      - name: Run Playwright backend tests
        run: pnpm test:backend:e2e

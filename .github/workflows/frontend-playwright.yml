name: Playwright Frontend Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-playwright:
    name: Frontend Playwright suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Run Playwright frontend tests
        run: pnpm test:frontend:e2e

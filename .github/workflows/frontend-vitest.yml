name: Vitest Frontend Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-vitest:
    name: Frontend Vitest suite
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest frontend tests
        run: pnpm test:frontend:unit

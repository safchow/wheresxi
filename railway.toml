# Optional Railway hint — the actual deploy config lives in each service's
# settings on railway.app. This file just declares that the repo is built
# via Dockerfiles; service roots and Dockerfile paths are configured per
# service.
#
# In Railway:
#   1. Create a project, add a Postgres + Redis plugin.
#   2. Create two services, both with source root `.` (the repo root, so
#      Docker builds have access to the pnpm workspace lockfile):
#        wheresxi-api  Dockerfile path: backend/Dockerfile
#        wheresxi-web  Dockerfile path: frontend/Dockerfile
#   3. Set env vars on `wheresxi-api`:
#        DATABASE_URL          (auto from Postgres plugin)
#        REDIS_URL             (auto from Redis plugin)
#        APP_KEY               (32+ random chars)
#        ALLOWED_ORIGINS       https://<your-web-service-domain>
#        OFFICE_TIMEZONE       America/Toronto
#        ACCESS_TOKEN_TTL_DAYS 30
#        USER_STARTING_CREDITS 500
#   4. Set env on `wheresxi-web` (build arg, not runtime):
#        VITE_API_BASE_URL     https://<your-api-service-domain>
[build]
builder = "DOCKERFILE"

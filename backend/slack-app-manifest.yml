display_information:
  name: wheresxi
  description: Slack companion app for wheresxi markets, bets, reminders, and settlement DMs.
  background_color: '#111827'
features:
  bot_user:
    display_name: wheresxi
    always_online: false
  slash_commands:
    - command: /wheresxi
      url: https://api.wheresxi.com/api/slack/commands
      description: Open wheresxi markets, bets, leaderboard, and account linking.
      usage_hint: help | link | markets | bet | bets | leaderboard
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
settings:
  interactivity:
    is_enabled: true
    request_url: https://api.wheresxi.com/api/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
